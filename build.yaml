overview: "Serves the Cadence music client its runtime config and proxies Lidarr requests server-side."
description: >
  CadenceConfig lets a Jellyfin server operator configure the Cadence music client once, in the
  plugin dashboard, so every client — web PWA and native iOS — is auto-configured at sign-in with
  no per-device setup. It serves the client's non-secret runtime config (marlin/Meilisearch search
  URL, sign-up URL, cast receiver id) and proxies the client's "request missing music" calls to
  Lidarr through a curated allowlist, injecting the Lidarr API key server-side so the write
  credential never reaches a browser or the app.
